{% extends "admin/base.html" %}
{% block title %} · 주문{% endblock %}
{% block nav_orders %}active{% endblock %}
{% block page_title %}<i class="bi bi-receipt me-2"></i>주문 관리{% endblock %}

{% block content %}
<!-- 필터 -->
<div class="card mb-3">
  <div class="card-body py-2 d-flex flex-wrap gap-2 align-items-center">
    <select id="statusFilter" class="form-select form-select-sm" style="max-width:160px">
      <option value="">전체 상태</option>
      <option>PENDING</option>
      <option>PAID</option>
      <option>PREPARING</option>
      <option>SHIPPED</option>
      <option>DELIVERED</option>
      <option>CANCELLED</option>
      <option>REFUNDED</option>
    </select>
    <button class="btn btn-sm btn-primary" onclick="loadOrders()"><i class="bi bi-search me-1"></i>검색</button>
    <span class="ms-auto text-muted small" id="totalLabel"></span>
  </div>
</div>

<!-- 테이블 -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>주문번호</th>
            <th>주문자</th>
            <th>상태</th>
            <th>결제수단</th>
            <th>총액</th>
            <th>최종 결제액</th>
            <th>주문일시</th>
            <th style="width:80px"></th>
          </tr>
        </thead>
        <tbody id="tBody">
          <tr><td colspan="8" class="text-center text-muted py-5">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div id="pgWrap" class="mt-3 d-flex justify-content-center"></div>

<!-- 주문 상세 모달 -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-semibold">주문 상세 — <span id="dOrderNumber" class="text-muted fw-normal"></span></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody">
        <div class="text-center py-4 text-muted">로딩 중...</div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let curPage = 1;
const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

const STATUS_LABEL = {
  PENDING: '결제대기', PAID: '결제완료', PREPARING: '상품준비',
  SHIPPED: '배송중', DELIVERED: '배송완료', CANCELLED: '취소', REFUNDED: '환불'
};
const PAY_LABEL = {
  CARD:'카드', BANK_TRANSFER:'계좌이체', KAKAO_PAY:'카카오페이',
  NAVER_PAY:'네이버페이', TOSS:'토스'
};

function statusBadge(s) {
  return `<span class="badge order-${s}">${STATUS_LABEL[s] ?? s}</span>`;
}

async function loadOrders(page = 1) {
  curPage = page;
  const status = document.getElementById('statusFilter').value;
  let url = `/admin/api/orders?page=${page}&limit=20`;
  if (status) url += `&status=${status}`;
  try {
    const res = await api('GET', url);
    document.getElementById('totalLabel').textContent = `총 ${res.pagination.total}건`;
    renderTable(res.data);
    renderPagination('pgWrap', res.pagination, 'loadOrders');
  } catch(e) { showToast(e.message, 'error'); }
}

function renderTable(orders) {
  const tb = document.getElementById('tBody');
  if (!orders.length) {
    tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">데이터가 없습니다.</td></tr>';
    return;
  }
  tb.innerHTML = orders.map(o => `
    <tr>
      <td><code class="small">${esc(o.order_number)}</code></td>
      <td>
        <div class="fw-semibold small">${esc(o.user_name ?? '-')}</div>
        <div class="text-muted small">${esc(o.user_email ?? '-')}</div>
      </td>
      <td>${statusBadge(o.status)}</td>
      <td class="small">${PAY_LABEL[o.payment_method] ?? o.payment_method ?? '-'}</td>
      <td>${fmtMoney(o.total_amount)}</td>
      <td class="fw-semibold">${fmtMoney(o.final_amount)}</td>
      <td class="text-muted small">${fmtDate(o.created_at)}</td>
      <td>
        <button class="btn btn-sm btn-outline-secondary py-0" onclick="openDetail('${o.id}','${esc(o.order_number)}')">
          <i class="bi bi-eye"></i> 상세
        </button>
      </td>
    </tr>`).join('');
}

async function openDetail(id, orderNumber) {
  document.getElementById('dOrderNumber').textContent = orderNumber;
  document.getElementById('detailBody').innerHTML = '<div class="text-center py-4 text-muted">로딩 중...</div>';
  detailModal.show();

  try {
    const res = await api('GET', `/admin/api/orders/${id}`);
    const o = res.data;
    document.getElementById('detailBody').innerHTML = `
      <div class="row g-3">
        <!-- 주문 정보 -->
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-header py-2 small fw-semibold bg-light">주문 정보</div>
            <div class="card-body p-0">
              <table class="table table-sm mb-0">
                <tbody>
                  <tr><th class="ps-3 text-muted fw-normal small" style="width:110px">상태</th>
                      <td>${statusBadge(o.status)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">결제수단</th>
                      <td>${PAY_LABEL[o.payment_method] ?? o.payment_method ?? '-'}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">결제일시</th>
                      <td>${fmtDate(o.paid_at)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">상품 합계</th>
                      <td>${fmtMoney(o.total_amount)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">할인</th>
                      <td class="text-danger">-${fmtMoney(o.discount_amount)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">배송비</th>
                      <td>${fmtMoney(o.shipping_fee)}</td></tr>
                  <tr class="table-light"><th class="ps-3 fw-semibold small">최종 결제액</th>
                      <td class="fw-semibold">${fmtMoney(o.final_amount)}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 배송지 & 주문자 -->
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-header py-2 small fw-semibold bg-light">주문자 & 배송지</div>
            <div class="card-body p-0">
              <table class="table table-sm mb-0">
                <tbody>
                  <tr><th class="ps-3 text-muted fw-normal small" style="width:90px">주문자</th>
                      <td>${esc(o.user_name ?? '-')}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">이메일</th>
                      <td>${esc(o.user_email ?? '-')}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">수령인</th>
                      <td>${esc(o.recipient)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">연락처</th>
                      <td>${esc(o.phone)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">우편번호</th>
                      <td>${esc(o.zip_code)}</td></tr>
                  <tr><th class="ps-3 text-muted fw-normal small">주소</th>
                      <td>${esc(o.address1)}${o.address2 ? ' ' + esc(o.address2) : ''}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 주문 상품 -->
        <div class="col-12">
          <div class="card">
            <div class="card-header py-2 small fw-semibold bg-light">주문 상품 (${o.items.length}개)</div>
            <div class="card-body p-0">
              <table class="table table-sm align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th class="ps-3">상품명</th>
                    <th>SKU</th>
                    <th>옵션</th>
                    <th>단가</th>
                    <th>수량</th>
                    <th>소계</th>
                  </tr>
                </thead>
                <tbody>
                  ${o.items.length ? o.items.map(item => `
                    <tr>
                      <td class="ps-3 fw-semibold small">${esc(item.product_name)}</td>
                      <td><code class="small">${esc(item.sku_code)}</code></td>
                      <td class="small text-muted">${esc(item.option_summary ?? '-')}</td>
                      <td>${fmtMoney(item.unit_price)}</td>
                      <td>${item.quantity}</td>
                      <td class="fw-semibold">${fmtMoney(item.subtotal)}</td>
                    </tr>`).join('')
                  : '<tr><td colspan="6" class="text-center text-muted py-3">주문 상품 없음</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 메모 -->
        ${(o.user_memo || o.admin_memo) ? `
        <div class="col-12">
          <div class="card">
            <div class="card-header py-2 small fw-semibold bg-light">메모</div>
            <div class="card-body py-2">
              ${o.user_memo  ? `<p class="small mb-1"><span class="text-muted">고객 메모:</span> ${esc(o.user_memo)}</p>`  : ''}
              ${o.admin_memo ? `<p class="small mb-0"><span class="text-muted">관리자 메모:</span> ${esc(o.admin_memo)}</p>` : ''}
            </div>
          </div>
        </div>` : ''}
      </div>`;
  } catch(e) {
    document.getElementById('detailBody').innerHTML =
      `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }
}

loadOrders();
</script>
{% endblock %}
