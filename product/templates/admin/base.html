<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; }
    .sidebar {
      width: 220px; min-height: 100vh;
      background: #1e2430;
      flex-shrink: 0;
    }
    .sidebar .brand { color: #fff; font-size: 1.1rem; font-weight: 700; padding: 1.2rem 1rem; display: block; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,.08); }
    .sidebar .nav-link { color: #9aa3b2; border-radius: 6px; margin: 2px 8px; padding: .5rem .75rem; font-size: .9rem; }
    .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,.07); }
    .sidebar .nav-link.active { color: #fff; background: #0d6efd; }
    .sidebar .nav-link i { width: 20px; }
    .main { flex: 1; min-width: 0; background: #f4f6fb; }
    .page-header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 1rem 1.5rem; }
    .page-body { padding: 1.5rem; }
    .card { border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .table > :not(caption) > * > * { padding: .6rem .75rem; }
    .badge-role-admin  { background: #dc3545; }
    .badge-role-user   { background: #6c757d; }
    .status-active     { background: #198754; }
    .status-inactive   { background: #ffc107; color: #000 !important; }
    .status-withdrawn  { background: #6c757d; }
    .order-PENDING    { background: #6c757d; }
    .order-PAID       { background: #0d6efd; }
    .order-PREPARING  { background: #fd7e14; }
    .order-SHIPPED    { background: #0dcaf0; color: #000 !important; }
    .order-DELIVERED  { background: #198754; }
    .order-CANCELLED  { background: #dc3545; }
    .order-REFUNDED   { background: #6f42c1; }
    .img-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #dee2e6; }
    .img-thumb-sm { width: 44px; height: 44px; object-fit: cover; border-radius: 4px; border: 1px solid #dee2e6; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh">

  <!-- 사이드바 -->
  <nav class="sidebar d-flex flex-column">
    <a class="brand" href="/admin/"><i class="bi bi-bag-heart me-2"></i>Admin Panel</a>
    <ul class="nav flex-column mt-2 px-1">
      <li><a class="nav-link {% block nav_users %}{% endblock %}" href="/admin/users">
        <i class="bi bi-people"></i> 사용자</a></li>
      <li><a class="nav-link {% block nav_categories %}{% endblock %}" href="/admin/categories">
        <i class="bi bi-tags"></i> 카테고리</a></li>
      <li><a class="nav-link {% block nav_products %}{% endblock %}" href="/admin/products">
        <i class="bi bi-box-seam"></i> 상품</a></li>
      <li><a class="nav-link {% block nav_orders %}{% endblock %}" href="/admin/orders">
        <i class="bi bi-receipt"></i> 주문</a></li>
    </ul>
  </nav>

  <!-- 본문 -->
  <div class="main d-flex flex-column">
    <div class="page-header d-flex align-items-center justify-content-between">
      <h5 class="mb-0 fw-semibold">{% block page_title %}{% endblock %}</h5>
      {% block header_actions %}{% endblock %}
    </div>
    <div class="page-body flex-grow-1">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastWrap" style="z-index:9999"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── 공통 유틸 ── */
function showToast(msg, type = 'success') {
  const id = 'toast_' + Date.now();
  const bg = type === 'success' ? 'bg-success' : 'bg-danger';
  document.getElementById('toastWrap').insertAdjacentHTML('beforeend', `
    <div id="${id}" class="toast align-items-center text-white ${bg} border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>`);
  new bootstrap.Toast(document.getElementById(id), {delay: 3000}).show();
}

async function api(method, url, data = null, isForm = false) {
  const opts = {method, headers: {}};
  if (data) {
    if (isForm) { opts.body = data; }
    else { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(data); }
  }
  const res = await fetch(url, opts);
  if (res.status === 204) return {};
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `오류 ${res.status}`);
  return json;
}

function fmtDate(d) { return d ? new Date(d).toLocaleString('ko-KR') : '-'; }
function fmtMoney(n) { return (n != null) ? Number(n).toLocaleString('ko-KR') + '원' : '-'; }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderPagination(containerId, pagination, loadFn) {
  const el = document.getElementById(containerId);
  const {total_pages, page} = pagination;
  if (total_pages <= 1) { el.innerHTML = ''; return; }
  const pages = Array.from({length: total_pages}, (_, i) => i + 1);
  el.innerHTML = `<nav><ul class="pagination pagination-sm mb-0">` +
    pages.map(n => `<li class="page-item ${n===page?'active':''}">
      <button class="page-link" onclick="${loadFn}(${n})">${n}</button></li>`).join('') +
    `</ul></nav>`;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
